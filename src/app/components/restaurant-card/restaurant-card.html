<div class="cart">
    <div class="location" > 
        <i class="fa-solid fa-location-dot" ></i>
        {{restaurant().district}}
    </div>
    <h4>{{restaurant().name}}</h4>
    <p class="specialty"> {{restaurant().specialty}}</p>
    <app-star-rating [currentRating]="restaurant().currentRating"
    (ratingChanged)="onStarClick($event)"></app-star-rating>
</div>
